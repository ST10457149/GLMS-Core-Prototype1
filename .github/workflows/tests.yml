name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore "GLMS Core Prototype1.Tests/GLMS Core Prototype1.Tests.csproj"

      - name: Test
        run: dotnet test "GLMS Core Prototype1.Tests/GLMS Core Prototype1.Tests.csproj" --no-restore --configuration Release
